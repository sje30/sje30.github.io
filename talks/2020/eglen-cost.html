# Problems

---
## We are evaluated on where, not what, we publish

Evaluation of research by impact factor or journal title

`$$I_y = \frac{C_{y-1} + C_{y-2}}{P_{y-1} + P_{y-2}}$$`

`\(C_y\)` = number of citations in year y, `\(P_y\)` = number of publications
in year y...

How could this possibly go wrong?

Strong pressure e.g. in China to pressure in journals with impact
factor over some threshold (5).

So many ways to game the system: *A user's guide to inflated and
manipulated impact factors* [(Ioannidis and Thombs, 2019)](https://www.ncbi.nlm.nih.gov/pubmed/31206647).

## Why preprint?

Advantages (https://www.plos.org/why-preprint):

1. Rapid dissemination of results
2. Establish priority
3. Increased attention/citations
4. Career advancement
5. Community
6. Unlimited / timely updates


Also: potential for early feedback, error reduction, improved
citations, editors might fish for papers.

Preprints are valid research outputs for REF2021 [Naomi
Penfold](https://asapbio.org/preprints-valid-for-ref2021).


???

(NIH early experiment stopped by journals in 1960s.)

Ask who submits preprints, and if so ask them why


---
## Evaluate journal subscription model

Think about which journals you support, by sending papers and
reviewing.

Support OA journals as authors and reviewers.  (Ever asked a journal
for permission to republish one of your own figures?)

Check out status of journal via Sherpa/Romeo service.

---
## What can your institutions &amp; funders do?

- sign up to DORA (Declaration of Research Assessment)
(Wellcome Trust have solved this problem).  Signing is easy, enforcing
is hard.

- Give ECR a voice within institutions.

- Recognise all research artefacts, not just papers, as valuable
  outputs.

- Give academics more ownership of funds.  "Do you really want to
   spend 5K on an APC, versus other uses in your lab?"

- Routes to OA need to be generate less admin for librarians /
   funders, not more.  Green OA achieves that.

- Support diamond OA initiatives led by academics and academic
   societies.


---
## Conclusions

- Many reasons to feel bad...

- But there are lots of reasons for optimism at new ways of doing
  science.

- Learn how to become an open scientist and use modern tools.

- Science improves one preprint submission at a time.

- Read more at http://bulliedintobadscience.org and sign up!
