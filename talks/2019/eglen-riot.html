## Suggestions

1. Immediate Green OA of author accepted manuscripts (AAMs) should be
   available *everywhere* to comply with OA mandates.  (UK SCL should
   help here.)  Pay for publisher services out of your own funds if
   you want them.

2. Give academics more ownership of funds.  "Do you really want to
   spend 5K on an APC, versus other uses in your lab?"

3. Routes to OA need to be generate less admin for librarians /
   funders, not more.  Green OA achieves that.

4. Support diamond OA initatives led by academics and academic
   societies.

5. Where APCs must be paid, they need to be transparent, and reflect
   costs of particular services.  (Waivers = essential.)


&lt;br&gt;	
[Costopoulos
(2019)](https://archeothoughts.wordpress.com/2019/05/14/the-transition-to-open-access-is-not-up-to-publishers-it-is-up-to-scholars-a-reply-to-inchcoombe/):

    "It is not up to commercial publishers to convince us 
	to transition to OA, by which ... they mean APC. 
	It is up to us as scholars to commit to OA."
