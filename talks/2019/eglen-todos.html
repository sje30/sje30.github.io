## About me

My research and how I got into open science.

## What is open science

- My definition of open science: a way to approach research which
  promotes sharing of (all / most) research artifacts.

- From this, open access (OA) to research papers is normally assumed.  But
  we all make mistakes...

## Selfish reasons to share

Why not align what is good for science with what is good for
scientists?


1. Funding mandates (REF + enforcement from Wellcome Trust)
2. Credit through data papers
3. Fixes data bugs / errors in analysis
4. Prevent data loss [(Vines et al 2014)](http://www.ncbi.nlm.nih.gov/pubmed/24361065). e.g. students have a habit of leaving...
5. Your future self is probably one of the main beneficiaries of
   sharing.
6. *Now* is a very good time to be an open scientist.
7. Leads to further collaborations
8. Reviewers can do more work...

---
## Rule 1: Data should be shared

Given the cost of generating data, I think data relating to a
publication should be shared along with the paper.

Funders (and increasingly many, but not all, journals) agree.

## Evaluate journal subscription model

Think about which journals you support, by sending papers and
reviewing.

Support OA journals as authors and reviewers.  (Ever asked a journal
for permission to republish one of your own figures?)

Check out status of journal via Sherpa/Romeo service.


---
## What can your institutions &amp; funders do?

- sign up to DORA (Declaration of Research Assessment)
(Wellcome Trust have solved this problem).  Signing is easy, enforcing
is hard.

- Give ECR a voice within institutions.

- Recognise all research artefacts, not just papers, as valuable
  outputs.

- Give academics more ownership of funds.  "Do you really want to
   spend 5K on an APC, versus other uses in your lab?"

- Routes to OA need to be generate less admin for librarians /
   funders, not more.  Green OA achieves that.

- Support diamond OA initiatives led by academics and academic
   societies.





## Conclusions

- CODECHECK sets the bar very low to encourage adoption

- Looking for feedback on how to get journals to adopt this.
